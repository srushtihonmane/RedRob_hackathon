# ============================================================================
# AI tools declaration (transparency only; not penalized)
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Claude was used extensively and is declared transparently. (1) Design: the system
  architecture — goal decomposition, data contracts, trap/honeypot strategy, runtime
  boundary — was developed through iterative human-AI brainstorming sessions and then
  reviewed and locked by the team as a written spec. (2) Implementation: Claude Code built
  the codebase from that spec feature-by-feature, with the team directing build order,
  compute strategy, and tuning decisions, and every stage verified against automated tests
  and the official validator. (3) During development, Claude Code locally read and profiled
  excerpts of the released candidate dataset (e.g. schema checks, distribution stats,
  debugging). The submitted ranking system itself contains NO LLM component: the ranking
  step loads precomputed artifacts and makes no model, LLM, or network calls of any kind.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Two-phase system mirroring the JD's "v2". OFFLINE precompute builds bge-small-en-v1.5
  embeddings (identity + query-aware evidence docs), a narrative-only BM25 index (skills[]
  excluded), 132 raw structured features + 23 behavioral signals, per-concept corroboration
  channels, and risk flags. The BUDGETED ranking step is a frozen scorer: recall-first union
  retrieval, then a corroboration-FIRST relevance engine — each JD must-have is satisfied via a
  trust-tiered noisy-OR (Verified assessment / Demonstrated career+dense / Declared) gated by a
  soft corroboration requirement, combined with a weighted geometric-mean soft-AND so no single
  channel (e.g. a high dense cosine or a keyword list) can inflate fit. Bounded, separable
  engagement and risk multipliers down-weight inactive or archetype-resembling profiles.
  Honeypots are excluded by three disjoint logical-impossibility rules; consulting-entire-career
  is gated with a product-stint override. Reasoning is a deterministic projection of the evidence
  trail (cites only assessments/career spans/signals — never the diluted skills[] array). Fully
  deterministic, CPU-only, no network; ranking step ~seconds on 16 GB.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
